services:
  nginx-lb:
    image: nginx:alpine
    container_name: i7-roundrobin-nginx-lb
    ports:
      - "8085:80"
    volumes:
      - ./nginx/i7-roundrobin.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - i7-web-1
      - i7-web-2
      - i7-web-3
      - i7-web-4
      - i7-web-5
      - i7-web-6
      - i7-web-7
    networks:
      - i7-roundrobin-network

  i7-web-1:
    image: python:3.9-slim
    container_name: i7-roundrobin-web-1
    environment:
      - SERVER_NAME=WEB SERVER 1 (i7-web-1)
      - SERVER_GROUP=I7
      - SERVER_COLOR=#00d4ff
      - PROCESS_DELAY=0.30
    volumes:
      - ./app:/app
    working_dir: /app
    command: sh -c "pip install --no-cache-dir flask && python app.py"
    networks:
      - i7-roundrobin-network

  i7-web-2:
