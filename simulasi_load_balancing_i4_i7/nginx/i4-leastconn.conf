events {
    worker_connections 1024;
}

http {
    upstream backend_servers {
        # Least Connections aktif.
        least_conn;

        server i4-web-1:5000;
        server i4-web-2:5000;
        server i4-web-3:5000;
        server i4-web-4:5000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
